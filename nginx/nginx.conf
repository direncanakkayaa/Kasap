events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Gzip Compression
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/xml text/css application/x-javascript application/json;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.(?!.*SV1)";

    # Main Website (80 -> 443)
    server {
        listen 80;
        server_name erdogankasap.com www.erdogankasap.com;
        
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # pgAdmin Security (80 -> 443)
    server {
        listen 80;
        server_name db.erdogankasap.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Main Website (SSL)
    server {
        listen 443 ssl;
        server_name erdogankasap.com www.erdogankasap.com;

        ssl_certificate /etc/letsencrypt/live/erdogankasap.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/erdogankasap.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://app:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /_next/static {
            proxy_pass http://app:3000;
            proxy_cache_bypass $http_upgrade;
            expires 365d;
            access_log off;
        }
    }

    # pgAdmin Security (SSL + Basic Auth)
    server {
        listen 443 ssl;
        server_name db.erdogankasap.com;

        # Note: You can share the wildcard cert if available, or Certbot will create a separate one.
        # Following the same structure as the main domain.
        ssl_certificate /etc/letsencrypt/live/erdogankasap.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/erdogankasap.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            # Basic Auth to protect pgAdmin
            auth_basic "Restricted Database Access";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://pgadmin:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Necessary for pgAdmin CSRF protection
            proxy_set_header X-Script-Name /;
        }
    }
}
